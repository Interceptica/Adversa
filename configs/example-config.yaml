meta:
  project: "example-project"
  # engagement_id: omit to auto-generate as adv-{timestamp}
  report_output: "./reports/output.html"

llm:
  model_name: "claude-sonnet-4-6"
  api_key_env: "LLM_API_KEY"   # name of the env var holding the key — never the value itself
  base_url: null  # null = Anthropic. Set for third-party Anthropic-compatible providers.

target:
  base_url: "https://example.com"
  included_hosts:
    - "example.com"
  excluded_hosts:
    - "admin.example.com"

authentication:
  login_type: "form"
  login_url: "https://example.com/login"
  credentials:
    username: "${TARGET_USERNAME}"
    password: "${TARGET_PASSWORD}"
    totp_secret: null
  login_flow:
    - "fill #username with credentials.username"
    - "fill #password with credentials.password"
    - "click #login-btn"
  success_condition:
    type: "url_contains"
    value: "/dashboard"
  token_extraction:
    type: "cookie"
    header: null

scope:
  rules:
    avoid:
      - description: "Skip logout endpoint"
        type: "path"
        url_path: "/logout"
      - description: "Skip admin panel"
        type: "path_pattern"
        url_path: "/admin/*"
    focus:
      - description: "Focus on API endpoints"
        type: "path_pattern"
        url_path: "/api/*"
  max_depth: 3
  rate_limit_rps: 10

pipeline:
  enabled:
    - "injection"
    - "authz"
    - "info_disclosure"
    - "ssrf"
    - "sast_triage"
    - "sca_reachability"
  timeout_per_pipeline_seconds: 300
  parallel: true
  max_concurrent_pipelines: 5

repo:
  path: "/path/to/target/repo"
  language: null          # auto-detected by Phase 0 if null
  semgrep_rulesets: null  # auto-detected by Phase 0 if null
  joern_enabled: true

# Optional: Langfuse observability tracing
# Requires LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_BASE_URL,
# LANGSMITH_OTEL_ENABLED=true, LANGSMITH_OTEL_ONLY=true, LANGSMITH_TRACING=true
# in the worker environment.
tracing:
  enabled: false
